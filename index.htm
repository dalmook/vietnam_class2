<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vietnam Word Quest</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <h1>🇻🇳 Vietnam Word Quest</h1>
      <div class="hud">
        <span>🔥 <strong id="streak">0</strong></span>
        <span>⭐ <strong id="xp">0</strong></span>
        <span>❤️ <strong id="hearts">3</strong></span>
      </div>
    </header>

    <section class="progress-wrap">
      <div class="progress-head">
        <span id="progressLabel">시작 준비</span>
        <span id="timerLabel">⏱️ --</span>
      </div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
    </section>

    <section class="screen-wrap">
      <article id="homeScreen" class="screen active">
        <h2>모드 선택</h2>
        <label for="lessonSelect">레슨</label>
        <select id="lessonSelect" disabled></select>
        <label for="sizeSelect">학습량</label>
        <select id="sizeSelect">
          <option value="10">가볍게 (10개)</option>
          <option value="16" selected>보통 (16개)</option>
          <option value="24">집중 (24개)</option>
        </select>
        <div class="button-grid two">
          <button id="startStudyBtn" class="btn primary" disabled>📘 단어 학습</button>
          <button id="startQuizBtn" class="btn blue" disabled>⚔️ 퀴즈 도전</button>
        </div>
      </article>

      <article id="studyScreen" class="screen">
        <h2 id="studyTitle">단어 학습</h2>
        <div id="flashCard" class="flash-card">
          <p id="studyTerm" class="term"></p>
          <p id="studyMeaning" class="meaning hidden"></p>
          <p id="studyExample" class="example"></p>
        </div>
        <div class="button-grid four">
          <button id="speakBtn" class="btn">🔊 발음</button>
          <button id="flipBtn" class="btn">뜻 보기</button>
          <button id="knownBtn" class="btn primary">외웠어요</button>
          <button id="againBtn" class="btn">다시</button>
        </div>
      </article>

      <article id="quizScreen" class="screen">
        <h2 id="quizTitle">퀴즈</h2>
        <p id="quizQuestion" class="quiz-question"></p>
        <div id="quizOptions" class="options"></div>
        <p id="quizFeedback" class="feedback"></p>
        <div class="button-grid two">
          <button id="quizSpeakBtn" class="btn">🔊 문제 발음</button>
          <button id="nextQuizBtn" class="btn blue" disabled>다음</button>
        </div>
      </article>

      <article id="resultScreen" class="screen">
        <h2>결과</h2>
        <p id="resultText" class="result-text"></p>
        <div class="button-grid two">
          <button id="retryBtn" class="btn primary">같은 모드 다시</button>
          <button id="homeBtn" class="btn">홈으로</button>
        </div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
