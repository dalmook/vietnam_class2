<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vietnam Word Quest</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <h1>🇻🇳 Vietnam Word Quest</h1>
      <div class="hud">
        <span>🔥 <strong id="streak">0</strong></span>
        <span>⭐ <strong id="xp">0</strong></span>
        <span>❤️ <strong id="hearts">3</strong></span>
      </div>
    </header>

    <section class="progress-wrap">
      <div class="progress-head">
        <span id="progressLabel">시작 준비</span>
        <span id="timerLabel">⏱️ --</span>
      </div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
    </section>

    <section class="screen-wrap">
      <article id="homeScreen" class="screen active home-screen">
        <section class="summary-bar">
          <div><small>누적 학습 수</small><strong id="sumTotal">0</strong></div>
          <div><small>오늘 학습 수</small><strong id="sumToday">0</strong></div>
          <div><small>오늘 복습 수</small><strong id="sumReview">0</strong></div>
          <div><small>연속 학습일</small><strong id="sumStreakDays">0</strong></div>
        </section>

        <section class="quick-entry">
          <button id="quickToday" class="btn blue">오늘 추천 학습</button>
          <button id="quickPron" class="btn">발음 복습</button>
          <button id="quickWrong" class="btn">오답 복습</button>
          <button id="quickOpic" class="btn">OPIc 모드</button>
        </section>

        <div class="roadmap-card">
          <p class="stage-chip" id="stageChip">현재 단계</p>
          <h3 id="stageTitle"></h3>
          <p id="stageGoal" class="muted"></p>
          <p id="stageTasks" class="tiny"></p>
          <p id="savedStats" class="tiny"></p>
        </div>

        <label for="sizeSelect">학습량</label>
        <select id="sizeSelect">
          <option value="8">짧게 (8개)</option>
          <option value="12" selected>보통 (12개)</option>
          <option value="18">집중 (18개)</option>
        </select>

        <section id="stageList" class="stage-map"></section>
      </article>

      <article id="studyScreen" class="screen">
        <div class="screen-head">
          <h2 id="studyTitle">단어 학습</h2>
          <button id="studyHomeBtn" class="btn ghost">홈으로</button>
        </div>

        <section class="study-meta">
          <p id="studyStageName"></p>
          <p id="studySubtopic"></p>
          <p id="studyProgressMeta"></p>
          <p id="studyRemaining"></p>
        </section>

        <div id="flashCard" class="flash-card">
          <p id="studyReason" class="study-reason"></p>
          <div id="studyBody"></div>
          <section id="studyTipsWrap" class="hidden"></section>
        </div>

        <div class="button-grid six">
          <button id="speakBtn" class="btn">🔊 듣기</button>
          <button id="slowSpeakBtn" class="btn">🐢 천천히</button>
          <button id="flipBtn" class="btn">뜻 보기/숨기기</button>
          <button id="toggleTipsBtn" class="btn">팁 보기/숨기기</button>
          <button id="knownBtn" class="btn primary">외웠어요</button>
          <button id="againBtn" class="btn">다시 볼래요</button>
        </div>
      </article>

      <article id="quizScreen" class="screen">
        <div class="screen-head">
          <h2 id="quizTitle">퀴즈</h2>
          <button id="quizHomeBtn" class="btn ghost">홈으로</button>
        </div>
        <p id="quizQuestion" class="quiz-question"></p>
        <div id="quizOptions" class="options"></div>
        <p id="quizFeedback" class="feedback"></p>
        <div class="button-grid two">
          <button id="quizSpeakBtn" class="btn">🔊 문제 발음</button>
          <button id="nextQuizBtn" class="btn blue" disabled>다음</button>
        </div>
      </article>

      <article id="resultScreen" class="screen">
        <h2>결과</h2>
        <p id="resultText" class="result-text"></p>
        <div class="button-grid two">
          <button id="retryBtn" class="btn primary">같은 모드 다시</button>
          <button id="homeBtn" class="btn">홈으로</button>
        </div>
      </article>
    </section>
  </main>

  <script src="data/curriculum.js"></script>
  <script src="app.js"></script>
</body>
</html>
